name: Container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/echobot-web-mobile

jobs:
  verify:
    name: Verify before publish
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build and publish image
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

      - name: Download verified container image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: echobot-container-${{ github.sha }}
          path: /tmp/echobot-container

      - name: Load and tag verified image
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker load --input /tmp/echobot-container/echobot-web-mobile-ci.tar.gz
          docker tag echobot-web-mobile:ci "${IMAGE_NAME}:upgrade"
          docker tag echobot-web-mobile:ci "${IMAGE_NAME}:sha-${short_sha}"

      - name: Push image
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker push "${IMAGE_NAME}:upgrade"
          docker push "${IMAGE_NAME}:sha-${short_sha}"

      - name: Publish latest tag on main
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag "${IMAGE_NAME}:upgrade" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"
