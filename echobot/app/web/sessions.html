<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EchoBot Sessions</title>
    <link rel="stylesheet" href="/web/assets/styles/shell-pages.css?v=admin-sessions-1">
</head>
<body class="admin-page sessions-page" data-page-title-key="sessions.pageTitle">
    <main id="sessions-root" class="admin-root sessions-root">
        <header class="admin-header">
            <div>
                <h1 data-i18n-key="sessions.heading">Sessions</h1>
                <p data-i18n-key="sessions.description">Session maintenance for Console, Stage, and Messenger.</p>
            </div>
            <div class="shell-header-controls">
                <div class="language-switcher" data-language-switcher></div>
                <div class="display-mode-switcher" data-display-mode-switcher></div>
            </div>
        </header>
        <nav class="admin-grid guide-nav" aria-label="Session quick links" data-i18n-aria-label-key="sessions.linksAria">
            <a href="/admin" data-i18n-key="guide.backToAdmin">Back to Admin</a>
            <a href="/console" data-i18n-key="admin.console">Console</a>
            <a href="/stage?session_name=default" data-session-link data-i18n-key="guide.openStage">Open Stage</a>
            <a href="/messenger?session_name=default" data-session-link data-i18n-key="guide.openMessenger">Open Messenger</a>
            <a href="/admin/characters" data-i18n-key="admin.characters">Characters</a>
            <a href="/admin/models" data-i18n-key="admin.llmModels">LLM Models</a>
            <a href="/admin/voice-models" data-i18n-key="admin.voiceModels">Voice Models</a>
            <a href="/admin/live2d" data-i18n-key="admin.live2d">Live2D</a>
            <a href="/admin/channels" data-i18n-key="admin.channels">Channels</a>
        </nav>
        <section class="session-admin-panel" aria-label="Session maintenance" data-i18n-aria-label-key="sessions.contentAria">
            <div class="session-admin-header">
                <div>
                    <h2 data-i18n-key="sessions.management">Session Management</h2>
                    <p id="sessions-status" data-i18n-key="sessions.loading">Loading sessions...</p>
                </div>
                <div class="session-admin-actions">
                    <button id="sessions-refresh" type="button" data-i18n-key="sessions.refresh">Refresh</button>
                </div>
            </div>
            <form id="sessions-create-form" class="session-create-form">
                <div class="model-profile-field-grid">
                    <label>
                        <span data-i18n-key="sessions.name">Session name</span>
                        <input id="sessions-create-name" type="text" maxlength="80" autocomplete="off" data-i18n-placeholder-key="sessions.namePlaceholder">
                    </label>
                    <label>
                        <span data-i18n-key="sessions.character">Character</span>
                        <select id="sessions-create-character"></select>
                    </label>
                    <label>
                        <span data-i18n-key="sessions.routeMode">Route mode</span>
                        <select id="sessions-create-route-mode">
                            <option value="chat_only">chat_only</option>
                            <option value="auto">auto</option>
                            <option value="agent">agent</option>
                        </select>
                    </label>
                    <label>
                        <span data-i18n-key="sessions.channelType">Channel type</span>
                        <select id="sessions-create-channel-type"></select>
                    </label>
                    <label>
                        <span data-i18n-key="sessions.channelIntegration">Channel integration</span>
                        <select id="sessions-create-channel-integration"></select>
                    </label>
                </div>
                <button id="sessions-create" type="submit" data-i18n-key="sessions.create">Create session</button>
            </form>
            <div id="sessions-list" class="session-admin-list"></div>
        </section>
    </main>
    <script type="module" src="/web/assets/sessions-app.js?v=admin-sessions-1"></script>
</body>
</html>
