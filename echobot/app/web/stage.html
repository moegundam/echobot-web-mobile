<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n-key="stage.pageTitle">EchoBot</title>
    <link rel="stylesheet" href="/web/assets/styles/shell-pages.css?v=stage-session-context-1">
</head>
<body class="stage-page" data-page-title-key="stage.pageTitle">
    <main id="stage-root" class="stage-root">
        <section id="stage-surface" class="stage-surface" aria-label="EchoBot stage" data-i18n-aria-label-key="stage.aria">
            <div class="stage-orbit stage-orbit-a" aria-hidden="true"></div>
            <div class="stage-orbit stage-orbit-b" aria-hidden="true"></div>
            <div class="stage-toolbar">
                <div class="stage-toolbar-controls">
                    <div class="language-switcher stage-language-switcher" data-language-switcher></div>
                    <div class="display-mode-switcher stage-display-mode-switcher" data-display-mode-switcher></div>
                    <label class="session-control stage-session-control">
                        <span data-i18n-key="stage.sessionTarget">Session</span>
                        <select id="stage-session-select" autocomplete="off"></select>
                    </label>
                    <nav class="stage-quick-nav" aria-label="Stage quick navigation" data-i18n-aria-label-key="stage.quickNavAria">
                        <a href="/console" data-i18n-key="admin.console">Console</a>
                        <a href="/messenger?session_name=default" data-session-link data-i18n-key="console.openMessenger">Messenger</a>
                        <a href="/admin/sessions" data-i18n-key="admin.sessions">Sessions</a>
                        <a href="/admin" data-i18n-key="console.openAdmin">Admin</a>
                    </nav>
                </div>
                <button id="stage-audio-enable" class="stage-audio-button" type="button" data-i18n-key="stage.audio.enable">
                    Enable audio
                </button>
            </div>
            <div id="stage-canvas-host" class="stage-canvas-host"></div>
            <div class="stage-subtitle-panel">
                <p id="stage-subtitle" class="stage-subtitle" data-i18n-key="stage.waiting">Waiting for stage events...</p>
                <div class="stage-meta-row">
                    <span id="stage-session-label" data-i18n-key="stage.sessionLabel">session: default</span>
                    <span id="stage-role-label" data-i18n-key="stage.roleLabel">Role: default</span>
                    <span id="stage-model-profile-label" data-i18n-key="stage.modelProfileLabel">Model: not set</span>
                    <span id="stage-voice-profile-label" data-i18n-key="stage.voiceProfileLabel">Voice: not set</span>
                    <span id="stage-live2d-profile-label" data-i18n-key="stage.live2dProfileLabel">Live2D: not set</span>
                    <span id="stage-channel-label" data-i18n-key="stage.channelLabel">Channel: web</span>
                    <span id="stage-status" data-i18n-key="stage.status.connecting">connecting</span>
                </div>
            </div>
        </section>
    </main>
    <script src="/web/assets/vendor/pixi.min.js"></script>
    <script src="/web/assets/vendor/live2dcubismcore.min.js"></script>
    <script src="/web/assets/vendor/cubism4.min.js"></script>
    <script type="module" src="/web/assets/stage-app.js?v=stage-live2d-session-2"></script>
</body>
</html>
