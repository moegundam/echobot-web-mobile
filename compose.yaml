services:
  echobot:
    build:
      context: .
      target: runtime
    image: ghcr.io/moegundam/echobot-web-mobile:upgrade
    ports:
      - "127.0.0.1:${ECHOBOT_HOST_PORT:-8000}:8000"
    env_file:
      - path: ./docker.env.local
        required: false
    environment:
      ECHOBOT_SHELL_SAFETY_MODE: ${ECHOBOT_SHELL_SAFETY_MODE:-workspace-write}
      ECHOBOT_TRUSTED_USER_HEADER_ENABLED: ${ECHOBOT_TRUSTED_USER_HEADER_ENABLED:-false}
      ECHOBOT_ADMIN_REQUIRED: ${ECHOBOT_ADMIN_REQUIRED:-false}
    volumes:
      - echobot_data:/app/.echobot
    tmpfs:
      - /tmp
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  echobot_data:
