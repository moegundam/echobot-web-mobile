worker_processes 1;
pid /tmp/echobot-nginx.pid;
error_log stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log off;
    server_tokens off;

    client_body_temp_path /tmp/echobot-nginx-client-body 1 2;
    fastcgi_temp_path /tmp/echobot-nginx-fastcgi 1 2;
    proxy_temp_path /tmp/echobot-nginx-proxy 1 2;
    scgi_temp_path /tmp/echobot-nginx-scgi 1 2;
    uwsgi_temp_path /tmp/echobot-nginx-uwsgi 1 2;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_cf_connecting_ip $echobot_client_ip {
        default $http_cf_connecting_ip;
        '' $remote_addr;
    }

    map $http_cf_access_authenticated_user_email $echobot_identity_key {
        default $http_cf_access_authenticated_user_email;
        '' $echobot_client_ip;
    }

    limit_req_zone $echobot_identity_key zone=echobot_api_identity:10m rate=10r/s;
    limit_req_zone $server_name zone=echobot_api_global:1m rate=100r/s;
    limit_req_zone $echobot_identity_key zone=echobot_web_identity:10m rate=30r/s;
    limit_req_zone $server_name zone=echobot_web_global:1m rate=200r/s;
    limit_req_zone $echobot_identity_key zone=echobot_stream_identity:10m rate=2r/s;
    limit_req_zone $server_name zone=echobot_stream_global:1m rate=40r/s;
    limit_conn_zone $echobot_identity_key zone=echobot_streams:10m;
    limit_conn_zone $server_name zone=echobot_global_streams:1m;

    upstream echobot_app {
        server 127.0.0.1:8000;
        keepalive 16;
    }

    server {
        listen 127.0.0.1:8080;
        server_name _;

        client_max_body_size 2m;
        client_body_buffer_size 128k;
        client_body_timeout 30s;
        client_header_timeout 15s;
        keepalive_timeout 30s;
        send_timeout 60s;
        limit_req_status 429;
        limit_conn_status 429;

        proxy_http_version 1.1;
        proxy_request_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $echobot_client_ip;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Cf-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;

        location = /healthz {
            proxy_buffering off;
            proxy_pass http://echobot_app;
        }

        location = /api/stage/events {
            limit_req zone=echobot_stream_identity burst=4 nodelay;
            limit_req zone=echobot_stream_global burst=80 nodelay;
            limit_conn echobot_streams 4;
            limit_conn echobot_global_streams 64;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_pass http://echobot_app;
        }

        location = /api/web/asr/ws {
            limit_req zone=echobot_stream_identity burst=4 nodelay;
            limit_req zone=echobot_stream_global burst=80 nodelay;
            limit_conn echobot_streams 4;
            limit_conn echobot_global_streams 64;
            proxy_buffering off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_pass http://echobot_app;
        }

        location = /api/attachments/images {
            client_max_body_size 42m;
            limit_req zone=echobot_api_identity burst=30 nodelay;
            limit_req zone=echobot_api_global burst=200 nodelay;
            proxy_buffering off;
            proxy_read_timeout 5m;
            proxy_send_timeout 5m;
            proxy_pass http://echobot_app;
        }

        location = /api/attachments/files {
            client_max_body_size 27m;
            limit_req zone=echobot_api_identity burst=30 nodelay;
            limit_req zone=echobot_api_global burst=200 nodelay;
            proxy_buffering off;
            proxy_read_timeout 5m;
            proxy_send_timeout 5m;
            proxy_pass http://echobot_app;
        }

        location = /api/web/stage/backgrounds {
            client_max_body_size 11m;
            limit_req zone=echobot_api_identity burst=30 nodelay;
            limit_req zone=echobot_api_global burst=200 nodelay;
            proxy_buffering off;
            proxy_read_timeout 5m;
            proxy_send_timeout 5m;
            proxy_pass http://echobot_app;
        }

        location = /api/web/live2d {
            client_max_body_size 210m;
            limit_req zone=echobot_api_identity burst=10 nodelay;
            limit_req zone=echobot_api_global burst=40 nodelay;
            proxy_buffering off;
            proxy_read_timeout 10m;
            proxy_send_timeout 10m;
            proxy_pass http://echobot_app;
        }

        location /api/ {
            limit_req zone=echobot_api_identity burst=30 nodelay;
            limit_req zone=echobot_api_global burst=200 nodelay;
            limit_conn echobot_streams 16;
            limit_conn echobot_global_streams 128;
            proxy_buffering off;
            proxy_read_timeout 5m;
            proxy_send_timeout 5m;
            proxy_pass http://echobot_app;
        }

        location / {
            limit_req zone=echobot_web_identity burst=60 nodelay;
            limit_req zone=echobot_web_global burst=400 nodelay;
            limit_conn echobot_streams 32;
            limit_conn echobot_global_streams 256;
            proxy_buffering off;
            proxy_read_timeout 5m;
            proxy_send_timeout 5m;
            proxy_pass http://echobot_app;
        }
    }
}
